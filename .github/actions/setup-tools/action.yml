name: Setup Tools
description: Setup required tools in the workspace

runs:
  using: composite
  steps:
  - name: Setup Tools
    uses: egose/actions/asdf-tools@799b388fb3497236093c6eb7e3eac0b4c8f956ce
    with:
      plugins: |
        picotools=https://github.com/egose/picotools.git

  - name: Install python tools
    run: |
      pip install -r requirements.txt
      asdf reshim
    shell: bash
